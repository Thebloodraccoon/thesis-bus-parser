<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cce7ff"/>
      <stop offset="40%" stop-color="#4aa3ff"/>
      <stop offset="100%" stop-color="#0055ff"/>
    </linearGradient>

    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#73c8ff"/>
      <stop offset="50%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff7b00"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#111827" />

  <path d="M 180 180 Q 240 160 280 200" stroke="url(#blueGrad)" stroke-width="3" fill="none" filter="url(#glow)"/>
  <path d="M 220 180 Q 250 190 290 220" stroke="url(#orangeGrad)" stroke-width="2" fill="none" />

  <circle cx="180" cy="180" r="5" fill="#4aa3ff" filter="url(#glow)"/>
  <circle cx="220" cy="155" r="7" fill="#ffb347" filter="url(#glow)"/>
  <circle cx="290" cy="220" r="6" fill="#ffb347" filter="url(#glow)"/>
  <circle cx="610" cy="150" r="4" fill="#ffb347" filter="url(#glow)"/>
  <circle cx="620" cy="130" r="2" fill="#4aa3ff" filter="url(#glow)"/>

  <text x="400" y="240" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="180" text-anchor="middle" letter-spacing="-5">
    <tspan fill="url(#blueGrad)">B</tspan>
    <tspan fill="url(#orangeGrad)">U</tspan>
    <tspan fill="url(#blueGrad)">S</tspan>
  </text>

  <text x="400" y="310" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="500" font-size="42" text-anchor="middle" fill="#e2e8f0">
    parsing System
  </text>
</svg>