apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100

  - name: ML_Loki
    type: loki
    url: ${ML_LOKI_URL}
    access: proxy
    jsonData:
      maxLines: 1000