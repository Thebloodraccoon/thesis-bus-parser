services:
  diplom_db:
    image: postgres:13
    container_name: diplom_db
    shm_size: "2g"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Europe/Kyiv
    ports:
      - "5432:5432"
    volumes:
      - infra_postgres_data:/var/lib/postgresql/data
      - ./postgres-config/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./postgres-config/pg_hba.conf:/etc/postgresql/pg_hba.conf
    command: >
      postgres -c config_file=/etc/postgresql/postgresql.conf
               -c hba_file=/etc/postgresql/pg_hba.conf
    env_file:
      - .env
    networks:
      - diplom_network

  diplom_test_db:
    image: postgres:13
    container_name: diplom_test_db
    environment:
      POSTGRES_USER: ${TEST_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD}
      POSTGRES_DB: ${TEST_POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - infra_test_postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - diplom_network

  diplom_redis:
    image: redis:6.2-alpine
    container_name: diplom_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - infra_redis_data:/data
    networks:
      - diplom_network

  backend_db:
    image: postgres:15
    container_name: backend_postgres_db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    networks:
      - diplom_network
    volumes:
      - backend_postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  backend_test_db:
    image: postgres:15
    container_name: backend_postgres_test_db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: ${TEST_DATABASE_USER}
      POSTGRES_PASSWORD: ${TEST_DATABASE_PASSWORD}
      POSTGRES_DB: ${TEST_DATABASE_NAME}
    volumes:
      - backend_test_postgres_data:/var/lib/postgresql/data
    networks:
      - diplom_network
    env_file:
      - .env

  backend_redis:
    image: redis:alpine
    container_name: backend_redis
    ports:
      - "6380:6379"
    volumes:
      - backend_redis_data:/data
    networks:
      - diplom_network

  backend_test_redis:
    image: redis:alpine
    container_name: backend_test_redis
    ports:
      - "6381:6379"
    volumes:
      - backend_test_redis_data:/data
    networks:
      - diplom_network

  diplom_pgadmin:
    image: dpage/pgadmin4
    container_name: diplom_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - diplom_db
      - backend_db
    volumes:
      - infra_pgadmin_data:/data
    env_file:
      - .env
    networks:
      - diplom_network

  diplom_pushgateway:
    image: prom/pushgateway:latest
    container_name: diplom_pushgateway
    ports:
      - "9091:9091"
    restart: always
    networks:
      - diplom_network

  diplom_prometheus:
    image: prom/prometheus:latest
    container_name: diplom_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - infra_prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: always
    networks:
      - diplom_network

  diplom_grafana:
    image: grafana/grafana:latest
    container_name: diplom_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - ML_LOKI_URL=${ML_LOKI_URL:-http://localhost:3100}
    volumes:
      - infra_grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    restart: always
    networks:
      - diplom_network


volumes:
  infra_postgres_data:
  infra_test_postgres_data:
  infra_pgadmin_data:
  infra_grafana_data:
  infra_redis_data:
  infra_prometheus_data:
  backend_postgres_data:
  backend_test_postgres_data:
  backend_redis_data:
  backend_test_redis_data:

networks:
  diplom_network:
    driver: bridge
